<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Preman</title>
  <script src="/static/_hyperscript.min.js"></script>
  <style>
    :root {
      color-scheme: dark light;
    }

    .request-row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .request-main {
      flex: 0 0 auto;
    }

    .request-options {
      flex: 0 0 auto;
    }

    .request-main>div {
      margin-bottom: 0.5rem;
    }

    .request-main input[type="text"] {
      width: 200px;
    }

    button {
      margin-top: 1rem;
      margin-bottom: 1rem;
    }

    fieldset {
      margin: 0;
    }
  </style>
</head>

<body>

  <div class="request-row">
    <div class="request-main">
      <div>
        <label>Protocol:</label>
        <input type="radio" name="protocol" value="http" checked> http
        <input type="radio" name="protocol" value="https"> https
      </div>

      <div>
        <label for="domain">Domain:</label>
        <input type="text" id="domain" value="127.0.0.1:8080" style="width: 200px;">
      </div>

      <div>
        <label for="path">Path:</label>
        <input type="text" id="path" value="/health" style="width: 200px;">
      </div>

      <div>
        <label>HTTP Method:</label>
        <select id="method" style="width: 100px;">
          <option value="GET" selected>GET</option>
          <option value="POST">POST</option>
          <option value="PUT">PUT</option>
          <option value="PATCH">PATCH</option>
          <option value="DELETE">DELETE</option>
          <option value="HEAD">HEAD</option>
          <option value="OPTIONS">OPTIONS</option>
        </select>
      </div>
    </div>

    <div class="request-options">
      <fieldset>
        <legend>Additional fetch options (RequestInit)</legend>

        <label for="headers-json">Headers (JSON):</label><br>
        <textarea id="headers-json" rows="3" cols="60"
          placeholder='{ "Content-Type": "application/json" }'>{}</textarea>
        <br><br>

        <label for="request-body">Request body (raw string):</label><br>
        <textarea id="request-body" rows="4" cols="60" placeholder='Optional payload'></textarea>
        <br><br>

        <label for="mode">mode:</label>
        <select id="mode">
          <option value="cors" selected>cors</option>
          <option value="no-cors">no-cors</option>
          <option value="same-origin">same-origin</option>
        </select>

        <label for="credentials">credentials:</label>
        <select id="credentials">
          <option value="same-origin" selected>same-origin</option>
          <option value="include">include</option>
          <option value="omit">omit</option>
        </select>

        <label for="cache">cache:</label>
        <select id="cache">
          <option value="default" selected>default</option>
          <option value="no-cache">no-cache</option>
          <option value="reload">reload</option>
          <option value="force-cache">force-cache</option>
          <option value="only-if-cached">only-if-cached</option>
        </select>

        <label for="redirect">redirect:</label>
        <select id="redirect">
          <option value="follow" selected>follow</option>
          <option value="error">error</option>
          <option value="manual">manual</option>
        </select>
      </fieldset>
    </div>
  </div>

  <button id="sendBtn" _="on click call sendRequest()">
    Send request
  </button>

  <div id="response-meta">
    No request sent yet.
  </div>

  <div>-------------------------------------------------</div>

  <div id="result" _="init
              attachShadow({ mode: 'open' }) on me
              put 'Click button to see response...' into my shadowRoot's innerHTML
            ">
  </div>

  <script type="text/hyperscript">
    js
      function escapeHtml(str) {
        if (typeof str !== 'string') return str;
        return str.replace(/[&<>]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          return m;
        });
      }

      function formatMetadataHtml(response) {
        let headersStr = '';
        response.headers.forEach((value, key) => {
          headersStr += `<div class="meta-row"><strong>${escapeHtml(key)}:</strong> ${escapeHtml(value)}</div>`;
        });
        return `
          <div class="meta-row"><strong>Status:</strong> ${response.status} ${escapeHtml(response.statusText)}</div>
          <div class="meta-row"><strong>OK:</strong> ${response.ok}</div>
          <div class="meta-row"><strong>Redirected:</strong> ${response.redirected}</div>
          <div class="meta-row"><strong>Type:</strong> ${escapeHtml(response.type)}</div>
          <div class="meta-row"><strong>URL:</strong> ${escapeHtml(response.url)}</div>
          <div class="meta-row"><strong>Headers:</strong> ${headersStr}</div>
        `;
      }

      async function sendRequest() {
        const protocol = document.querySelector('input[name="protocol"]:checked').value;
        const domain = document.getElementById('domain').value;
        const path = document.getElementById('path').value;
        const fullUrl = `${protocol}://${domain}${path}`;

        const method = document.getElementById('method').value;

        let headers = {};
        const headersText = document.getElementById('headers-json').value;
        if (headersText.trim()) {
          try {
            headers = JSON.parse(headersText);
            if (typeof headers !== 'object' || Array.isArray(headers)) {
              throw new Error('Headers must be a JSON object');
            }
          } catch (e) {
            document.getElementById('result').shadowRoot.innerHTML = `Headers error: ${e.message}`;
            return;
          }
        }

        let body = document.getElementById('request-body').value;
        if (method === 'GET' || method === 'HEAD') {
          body = undefined;
        } else {
          body = body || undefined;
        }

        const mode = document.getElementById('mode').value;
        const credentials = document.getElementById('credentials').value;
        const cache = document.getElementById('cache').value;
        const redirect = document.getElementById('redirect').value;

        const fetchOptions = {
          method,
          headers,
          mode,
          credentials,
          cache,
          redirect
        };
        if (body !== undefined) fetchOptions.body = body;

        const metaDiv = document.getElementById('response-meta');
        const resultDiv = document.getElementById('result');
        metaDiv.innerHTML = 'Sending request...';
        resultDiv.shadowRoot.innerHTML = 'Waiting for response...';

        try {
          const response = await fetch(fullUrl, fetchOptions);
          const metaHtml = formatMetadataHtml(response);
          metaDiv.innerHTML = metaHtml;

          // Attempt to parse as JSON, fallback to raw text (which may be HTML)
          let bodyContent = '';
          const contentType = response.headers.get('content-type') || '';
          if (contentType.includes('application/json')) {
            const json = await response.json();
            bodyContent = `<code>${JSON.stringify(json, null, 2)}</code>`;
          } else {
            // For text/html, plain text, etc. – insert raw (will render HTML)
            bodyContent = await response.text();
          }
          resultDiv.shadowRoot.innerHTML = bodyContent;
        } catch (error) {
          metaDiv.innerHTML = `Error: ${error.message}`;
          resultDiv.shadowRoot.innerHTML = `Request failed: ${error.message}`;
        }
      }
    end
  </script>
</body>

</html>
