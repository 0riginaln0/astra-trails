<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Preman</title>
    <style>
        :root {
            color-scheme: dark light;
            --sidebar-bg: canvas;
            --sidebar-header-bg: color-mix(in srgb, currentColor 10%, transparent);
            --sidebar-shadow: rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --sidebar-shadow: rgba(255, 255, 255, 0.1);
                --sidebar-header-bg: color-mix(in srgb, currentColor 30%, transparent);
            }
        }

        .saved-tests {  
            position: fixed;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100%;
            background: var(--sidebar-bg);
            transition: right 0.3s ease-in-out;
            box-shadow: -2px 0 5px var(--sidebar-shadow);
            z-index: 1000;
            overflow-y: auto;
        }

        .saved-tests.open {
            right: 0;
        }

        .saved-tests h3 {
            padding: 10px;
            margin: 0;
            background: var(--sidebar-header-bg);
            color: canvastext;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        textarea {
            min-width: 333px;
            min-height: 99px;
        }

        #url {
            width: auto;
            min-width: 333px;
            max-width: 100%;
            box-sizing: border-box;
        }
        
        #testsList .test-item {
            display: block;
            padding: 8px 12px;
            margin: 4px 8px;
            border-radius: 4px;
            background: var(--sidebar-header-bg);
            color: canvastext;
            cursor: pointer;
            transition: background 0.2s;
        }

        #testsList .test-item:hover {
            background: color-mix(in srgb, currentColor 20%, transparent);
        }

        #testsList .test-item .delete-btn {
            float: right;
            margin-left: 8px;
            color: inherit;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="menu-bar">
            <button onclick="saveCurrentTest()">💾 Save Test Case</button>
            <button onclick="toggleSavedTests()">📂 Show Saved Tests</button>
            <button onclick="createNewTest()">✨ New Test</button>
            <button onclick="exportTests()">📤 Export All Tests</button>
            <input type="file" id="importFile" style="display: none;" onchange="importTests(event)">
            <button onclick="document.getElementById('importFile').click()">📥 Import Tests</button>
        </div>

        <h1>API Client</h1>

        <div class="input-group">
            <label for="method">Method:</label>
            <select id="method">
                <option value="GET">GET</option>
                <option value="POST">POST</option>
                <option value="PUT">PUT</option>
                <option value="PATCH">PATCH</option>
                <option value="DELETE">DELETE</option>
            </select>
        </div>

        <div class="input-group">
            <label for="url">URL:</label>
            <br>
            <input type="text" id="url" placeholder="https://api.example.com/endpoint">
        </div>

        <div class="input-group">
            <label for="headers">Headers (JSON format):</label>
            <br>
            <textarea id="headers"
                placeholder='{"Content-Type": "application/json", "Authorization": "Bearer token"}'></textarea>
        </div>

        <div class="input-group">
            <label>Request Type:</label>
            <select id="requestType" onchange="toggleRequestInputs()">
                <option value="json">JSON</option>
                <option value="formData">Form Data</option>
            </select>
        </div>

        <div id="jsonInput" class="input-group">
            <label for="body">Request Body (JSON format):</label>
            <br>
            <textarea id="body" placeholder='{"key": "value", "nested": {"field": true}}'></textarea>
        </div>

        <div id="formDataInput" class="input-group" style="display: none;">
            <label>Form Data (multipart/form-data):</label>
            <div id="formFields">
                <div class="form-field">
                    <input type="text" class="field-key" placeholder="Key">
                    <select class="field-type" onchange="toggleFieldInput(this)">
                        <option value="text">Text</option>
                        <option value="file">File</option>
                    </select>
                    <input type="text" class="field-value" placeholder="Value">
                    <input type="file" class="field-file" style="display: none;">
                    <button type="button" onclick="removeFormField(this)">✖ Remove</button>
                </div>
            </div>
            <button type="button" onclick="addFormField()">+ Add Field</button>
        </div>

        <button class="send-request-btn" onclick="sendRequest()">Send Request</button>

        <div class="response">
            <h3>Response</h3>
            <div><strong>Status:</strong> <span id="status">—</span></div>
            <div><strong>Headers:</strong>
                <pre id="responseHeaders"></pre>
            </div>
            <div><strong>Body:</strong>
                <pre id="responseBody"></pre>
            </div>
        </div>

        <div class="saved-tests" id="savedTests">
            <h3>📁 Saved Test Cases <span style="font-size:0.8rem; cursor:pointer;"
                    onclick="toggleSavedTests()">✕</span></h3>
            <div id="testsList"></div>
        </div>
    </div>

    <script>
        function toggleRequestInputs() {
            const requestType = document.getElementById('requestType').value;
            document.getElementById('jsonInput').style.display =
                requestType === 'json' ? 'block' : 'none';
            document.getElementById('formDataInput').style.display =
                requestType === 'formData' ? 'block' : 'none';
        }

        function addFormField() {
            const formFields = document.getElementById('formFields');
            const newField = document.createElement('div');
            newField.className = 'form-field';
            newField.innerHTML = `
            <input type="text" class="field-key" placeholder="Key">
            <select class="field-type" onchange="toggleFieldInput(this)">
                <option value="text">Text</option>
                <option value="file">File</option>
            </select>
            <input type="text" class="field-value" placeholder="Value">
            <input type="file" class="field-file" style="display: none;">
            <button type="button" onclick="removeFormField(this)">✖ Remove</button>
        `;
            formFields.appendChild(newField);
        }

        function removeFormField(button) {
            button.parentElement.remove();
        }

        function toggleFieldInput(select) {
            const fieldDiv = select.parentElement;
            const fieldValue = fieldDiv.querySelector('.field-value');
            const fieldFile = fieldDiv.querySelector('.field-file');
            if (select.value === 'file') {
                fieldValue.style.display = 'none';
                fieldFile.style.display = 'block';
            } else {
                fieldValue.style.display = 'block';
                fieldFile.style.display = 'none';
            }
        }

        async function sendRequest() {
            const method = document.getElementById('method').value;
            const url = document.getElementById('url').value;
            const requestType = document.getElementById('requestType').value;
            let headers = {};
            let body = null;

            if (!url.trim()) {
                alert('Please enter a URL');
                return;
            }

            try {
                headers = JSON.parse(document.getElementById('headers').value || '{}');
            } catch (e) {
                alert('Invalid headers JSON format');
                return;
            }

            if (requestType === 'json') {
                try {
                    const bodyText = document.getElementById('body').value;
                    if (bodyText) {
                        body = JSON.stringify(JSON.parse(bodyText));
                    }
                } catch (e) {
                    alert('Invalid body JSON format');
                    return;
                }
            } else {
                const formData = new FormData();
                const formFields = document.querySelectorAll('.form-field');
                for (const field of formFields) {
                    const key = field.querySelector('.field-key').value;
                    const type = field.querySelector('.field-type').value;
                    if (!key) continue;
                    if (type === 'file') {
                        const fileInput = field.querySelector('.field-file');
                        if (fileInput.files.length > 0) {
                            formData.append(key, fileInput.files[0]);
                        }
                    } else {
                        const value = field.querySelector('.field-value').value;
                        formData.append(key, value);
                    }
                }
                body = formData;
                delete headers['Content-Type'];
            }

            try {
                const response = await fetch(url, { method, headers, body });
                document.getElementById('status').textContent = `${response.status} ${response.statusText}`;
                const responseHeaders = {};
                response.headers.forEach((value, key) => { responseHeaders[key] = value; });
                document.getElementById('responseHeaders').textContent = JSON.stringify(responseHeaders, null, 2);
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/json')) {
                    const responseBody = await response.json();
                    document.getElementById('responseBody').textContent = JSON.stringify(responseBody, null, 2);
                } else {
                    const textBody = await response.text();
                    document.getElementById('responseBody').textContent = textBody || '(empty response)';
                }
            } catch (error) {
                document.getElementById('status').textContent = '❌ Network Error';
                document.getElementById('responseBody').textContent = error.message;
            }
        }

        function createNewTest() {
            document.getElementById('method').value = 'GET';
            document.getElementById('url').value = '';
            document.getElementById('headers').value = '';
            document.getElementById('body').value = '';
            document.getElementById('requestType').value = 'json';
            toggleRequestInputs();
            const formFieldsContainer = document.getElementById('formFields');
            formFieldsContainer.innerHTML = `
            <div class="form-field">
                <input type="text" class="field-key" placeholder="Key">
                <select class="field-type" onchange="toggleFieldInput(this)">
                    <option value="text">Text</option>
                    <option value="file">File</option>
                </select>
                <input type="text" class="field-value" placeholder="Value">
                <input type="file" class="field-file" style="display: none;">
                <button type="button" onclick="removeFormField(this)">✖ Remove</button>
            </div>
        `;
        }

        function saveCurrentTest() {
            const testName = prompt('Enter a name for this test case:');
            if (!testName) return;
            const formDataFields = [];
            document.querySelectorAll('#formFields .form-field').forEach(field => {
                const key = field.querySelector('.field-key').value;
                const type = field.querySelector('.field-type').value;
                const value = field.querySelector('.field-value').value;
                formDataFields.push({ key, type, value });
            });
            const testCase = {
                name: testName,
                method: document.getElementById('method').value,
                url: document.getElementById('url').value,
                headers: document.getElementById('headers').value,
                requestType: document.getElementById('requestType').value,
                body: document.getElementById('body').value,
                formData: formDataFields
            };
            let savedTests = JSON.parse(localStorage.getItem('apiTests') || '[]');
            savedTests.push(testCase);
            localStorage.setItem('apiTests', JSON.stringify(savedTests));
            updateTestsList();
            alert(`✅ Test "${testName}" saved!`);
        }

        function loadTest(test) {
            document.getElementById('method').value = test.method;
            document.getElementById('url').value = test.url;
            document.getElementById('headers').value = test.headers;
            document.getElementById('requestType').value = test.requestType;
            document.getElementById('body').value = test.body;
            toggleRequestInputs();
            const formFieldsContainer = document.getElementById('formFields');
            formFieldsContainer.innerHTML = '';
            if (test.formData && test.formData.length) {
                test.formData.forEach(field => {
                    const newField = document.createElement('div');
                    newField.className = 'form-field';
                    newField.innerHTML = `
                    <input type="text" class="field-key" value="${escapeHtml(field.key)}" placeholder="Key">
                    <select class="field-type" onchange="toggleFieldInput(this)">
                        <option value="text" ${field.type === 'text' ? 'selected' : ''}>Text</option>
                        <option value="file" ${field.type === 'file' ? 'selected' : ''}>File</option>
                    </select>
                    <input type="text" class="field-value" value="${escapeHtml(field.value)}" placeholder="Value">
                    <input type="file" class="field-file" style="display: none;">
                    <button type="button" onclick="removeFormField(this)">✖ Remove</button>
                `;
                    formFieldsContainer.appendChild(newField);
                    const selectEl = newField.querySelector('.field-type');
                    if (selectEl.value === 'file') {
                        const textVal = newField.querySelector('.field-value');
                        const fileInput = newField.querySelector('.field-file');
                        if (textVal) textVal.style.display = 'none';
                        if (fileInput) fileInput.style.display = 'block';
                    }
                });
            } else {
                const defaultField = document.createElement('div');
                defaultField.className = 'form-field';
                defaultField.innerHTML = `
                <input type="text" class="field-key" placeholder="Key">
                <select class="field-type" onchange="toggleFieldInput(this)">
                    <option value="text">Text</option>
                    <option value="file">File</option>
                </select>
                <input type="text" class="field-value" placeholder="Value">
                <input type="file" class="field-file" style="display: none;">
                <button type="button" onclick="removeFormField(this)">✖ Remove</button>
            `;
                formFieldsContainer.appendChild(defaultField);
            }
        }

        function deleteTest(index) {
            if (!confirm('Permanently delete this test case?')) return;
            let savedTests = JSON.parse(localStorage.getItem('apiTests') || '[]');
            savedTests.splice(index, 1);
            localStorage.setItem('apiTests', JSON.stringify(savedTests));
            updateTestsList();
        }

        function updateTestsList() {
            const testsList = document.getElementById('testsList');
            const savedTests = JSON.parse(localStorage.getItem('apiTests') || '[]');
            const escapeHtml = (str) => {
                if (!str) return '';
                return str.replace(/[&<>]/g, function (m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            };
            testsList.innerHTML = savedTests.map((test, index) => `
            <div class="test-item" data-index="${index}">
                <span>${escapeHtml(test.name)}</span>
                <span class="delete-btn" data-index="${index}">✕</span>
            </div>
        `).join('');
            document.querySelectorAll('.test-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-btn')) return;
                    const idx = parseInt(item.dataset.index);
                    loadTest(savedTests[idx]);
                    toggleSavedTests();
                });
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.index);
                    deleteTest(idx);
                });
            });
        }

        function toggleSavedTests() {
            const sidebar = document.getElementById('savedTests');
            sidebar.classList.toggle('open');
            if (sidebar.classList.contains('open')) updateTestsList();
        }

        function exportTests() {
            const savedTests = localStorage.getItem('apiTests') || '[]';
            const blob = new Blob([savedTests], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `api-tests-${new Date().toISOString().slice(0, 19)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importTests(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const tests = JSON.parse(e.target.result);
                    if (Array.isArray(tests)) {
                        localStorage.setItem('apiTests', JSON.stringify(tests));
                        updateTestsList();
                        alert(`✅ Imported ${tests.length} test cases.`);
                    } else {
                        throw new Error('Invalid format');
                    }
                } catch (error) {
                    alert('Error: file must be a valid JSON array of test cases.');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        updateTestsList();
        toggleRequestInputs();
    </script>
</body>

</html>
