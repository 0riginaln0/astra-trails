<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Preman</title>
    <script src="/static/_hyperscript.min.js"></script>
    <style>
        :root {
            color-scheme: dark light;
        }
    </style>
</head>

<body>

    <label>Protocol:</label>
    <input type="radio" name="protocol" value="http" checked> http
    <input type="radio" name="protocol" value="https"> https
    <br><br>

    <label for="domain">Domain:</label>
    <input type="text" id="domain" value="127.0.0.1:8080" style="width: 200px;">
    <br><br>

    <label for="path">Path:</label>
    <input type="text" id="path" value="/health" style="width: 200px;">
    <br><br>

    <label>HTTP Method:</label>
    <select id="method" style="width: 100px;">
      <option value="GET" selected>GET</option>
      <option value="POST">POST</option>
      <option value="PUT">PUT</option>
      <option value="PATCH">PATCH</option>
      <option value="DELETE">DELETE</option>
      <option value="HEAD">HEAD</option>
      <option value="OPTIONS">OPTIONS</option>
    </select>
    <br><br>

    <script type="text/hyperscript">
            js
                async function responseToMap(response) {
                    const map = {
                        status: response.status,
                        statusText: response.statusText,
                        ok: response.ok,
                        redirected: response.redirected,
                        type: response.type,
                        url: response.url,
                        headers: {},
                        body: null,
                    };
    
                    const headers = response.headers;
                    headers.forEach((value, key) => {
                        map.headers[key] = value;
                    });
    
                    // Extract body: try JSON first, fallback to text, null if none
                    try {
                        // clone to avoid consuming the original response
                        map.body = await response.clone().json();
                        map.body_type = "json"
                    } catch (e) {
                        try {
                            map.body = await response.clone().text();
                            map.body_type = "text"
                        } catch (e) {
                            map.body = null;
                        }
                    }
    
                    return map;
                }

                function formatMetadataHtml(map) {
                    return `
                        <div class="meta-row"><strong>Status:</strong> ${map.status} ${escapeHtml(map.statusText)}</div>
                        <div class="meta-row"><strong>OK:</strong> ${map.ok}</div>
                        <div class="meta-row"><strong>Redirected:</strong> ${map.redirected}</div>
                        <div class="meta-row"><strong>Type:</strong> ${escapeHtml(map.type)}</div>
                        <div class="meta-row"><strong>URL:</strong> ${escapeHtml(map.url)}</div>
                    `;
                }

                // Simple XSS prevention
                function escapeHtml(str) {
                    if (typeof str !== 'string') return str;
                    return str.replace(/[&<>]/g, function(m) {
                        if (m === '&') return '&amp;';
                        if (m === '<') return '&lt;';
                        if (m === '>') return '&gt;';
                        return m;
                    });
                }

                return { responseToMap, formatMetadataHtml, escapeHtml };
            end
        </script>
    
    <!-- Button: all heavy lifting done by JS functions -->
    <button _="on click
                    set protocol to the value of <input[name='protocol']:checked/>
                    set domain to #domain's value
                    set path to #path's value
                    set full_url to `${protocol}://${domain}${path}`
    
                    fetch `${full_url}` as response with method: `${#method's value}`
                    set resp to it
                    call responseToMap(resp)
                    set map to it

                    set metaHtml to formatMetadataHtml(map)
                    put metaHtml into #response-meta's innerHTML

                    if map.body_type is 'json' then                
                        set body to map.body as JSON
                    else
                        set body to map.body as HTML
                    end

                    put body into #result's shadowRoot.innerHTML

                    catch error
                        put `Error occurred: ${error.message}` into #result's shadowRoot.innerHTML
                    end">
        Send request!
    </button>

    <div id="response-meta">
        No request sent yet.
    </div>

    <div>-------------------------------------------------</div>

    <div id="result" 
         _="init
              attachShadow({ mode: 'open' }) on me
              put 'Click button to see response...' into my shadowRoot's innerHTML
              ">
    </div>

</body>
</html>
